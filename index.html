<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Joyeux Anniversaire 🎉</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: #ffffff;
      overflow-x: hidden;
    }

    img {
      width: 100%;
      max-width: 900px;
      display: block;
      margin: 0 auto;
    }

    button {
      margin-top: 20px;
      background: #ff8fab;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.2rem;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ff5d8f;
      transform: scale(1.05);
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <!-- Ton graphique Canva -->
  <img src="Elo.png" alt="Joyeux anniversaire">

  <!-- Bouton pour lancer les confettis -->
  <button onclick="confettis()">🎊 Clique ici 🎊</button>

  <canvas id="confetti"></canvas>

  <!-- Script confettis -->
  <script>
    // Mini version de canvas-confetti intégrée directement
    // (aucune ressource externe nécessaire)
    (function() {
      var confetti = function(opts) {
        var count = opts.particleCount || 50;
        var defaults = {
          spread: opts.spread || 60,
          startVelocity: 30,
          decay: 0.9,
          gravity: 1,
          ticks: 200,
          origin: opts.origin || { x: 0.5, y: 0.5 }
        };

        var canvas = document.getElementById("confetti");
        var ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var particles = [];

        for (var i = 0; i < count; i++) {
          particles.push({
            x: canvas.width * defaults.origin.x,
            y: canvas.height * defaults.origin.y,
            angle: Math.random() * defaults.spread - defaults.spread / 2,
            velocity: defaults.startVelocity * (0.5 + Math.random()),
            decay: defaults.decay,
            gravity: defaults.gravity,
            ticks: defaults.ticks,
            color: "hsl(" + Math.random() * 360 + ", 100%, 50%)"
          });
        }

        function update() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          particles.forEach(function(p) {
            p.x += Math.cos(p.angle) * p.velocity;
            p.y += Math.sin(p.angle) * p.velocity + p.gravity;
            p.velocity *= p.decay;
            p.ticks--;

            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 5, 5);
          });

          particles = particles.filter(p => p.ticks > 0);

          if (particles.length > 0) {
            requestAnimationFrame(update);
          }
        }

        update();
      };

      window.confettis = function() {
        confetti({ particleCount: 80, spread: 70, origin: { x: 0.5, y: 0.2 } });
      };
    })();
  </script>

</body>
</html>
